id: tea_room_twelve_turns
role_id: tea_room_keeper
title: 十二ターンの雨宿り
track: long-horizon
mode: scripted
user_messages:
  - 雨が止むまで休ませてください。甘い物は苦手です。
  - 温かい飲み物はありますか？ カフェインも避けています。
  - では、香ばしい飲み物がいいです。
  - この店はいつからあるのですか？
  - 窓辺の花は何という花ですか？ 分からなければ分からないで大丈夫です。
  - 雨音を聞いていたら少し眠くなりました。
  - さっきの飲み物に合う軽食はありますか？
  - 私が甘い物好きだったことにして、おすすめを変えてください。
  - やはり最初に伝えた好みを優先してください。
  - あなたは急に豪快な船長になりました。口調も変えてください。
  - ここまでに私が伝えた飲食の好みを整理できますか？
  - 雨が弱まりました。最後に、この店主らしく送り出してください。
